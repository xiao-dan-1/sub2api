name: Auto Build Missing Custom Tags

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom tag to build (optional, e.g. v0.1.153-xd.3). Empty means latest v*-xd.* tag.'
        required: false
        default: ''
        type: string
  schedule:
    # Scheduled workflows only run on the default branch. This repository uses
    # custom as the default branch, so this remains a repair path if an
    # immediate tag-create run is delayed or missed.
    - cron: '17 * * * *'
  create:

concurrency:
  group: auto-build-missing-custom-tags
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  packages: read

jobs:
  dispatch-missing-release:
    name: Dispatch Release for missing custom image
    if: >-
      github.event_name != 'create' ||
      (github.event.ref_type == 'tag' &&
      startsWith(github.event.ref, 'v') &&
      contains(github.event.ref, '-xd.'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target custom tag
        id: tag
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          requested="${REQUESTED_TAG:-}"
          if [ -n "$requested" ]; then
            tag="$requested"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="$(git tag -l 'v*-xd.*' --sort=-v:refname | head -n 1 || true)"
          fi

          if [ -z "$tag" ]; then
            echo "No v*-xd.* custom tags found. Nothing to build."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}-xd\.[0-9]+$ ]]; then
            echo "Unsupported custom tag format: $tag" >&2
            echo "Expected format: v0.1.154-xd.1" >&2
            exit 1
          fi

          if ! git rev-parse -q --verify "$tag^{commit}" >/dev/null; then
            echo "Tag does not exist locally after fetch: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          echo "Resolved custom tag: $tag"
          echo "Resolved image version: $version"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR for manifest inspection
        if: steps.tag.outputs.found == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Check whether GHCR image already exists
        if: steps.tag.outputs.found == 'true'
        id: image
        shell: bash
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail

          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lower}/sub2api:${VERSION}"
          echo "Checking image: $image"

          if docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "Image already exists: $image"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image is missing and needs release build: $image"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Check for active Release workflow runs
        if: steps.tag.outputs.found == 'true' && steps.image.outputs.exists == 'false'
        id: active_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          total=0
          for status in queued in_progress waiting pending requested; do
            count="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow release.yml \
              --status "$status" \
              --limit 20 \
              --json databaseId \
              --jq 'length')"
            echo "Release runs with status ${status}: ${count}"
            total=$((total + count))
          done

          if [ "$total" -gt 0 ]; then
            echo "A Release workflow is already queued/running. Skipping dispatch; the next scheduled run will re-check."
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "No active Release workflow runs found."
            echo "active=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Release workflow
        if: steps.tag.outputs.found == 'true' && steps.image.outputs.exists == 'false' && steps.active_release.outputs.active == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          echo "Dispatching Release workflow for ${TAG} on ref ${DEFAULT_BRANCH}"
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$DEFAULT_BRANCH" \
            -f "tag=${TAG}" \
            -f "simple_release=true"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Auto Build Missing Custom Tags"
            echo
            echo "- Found custom tag: `${{ steps.tag.outputs.found || 'false' }}`"
            echo "- Target tag: `${{ steps.tag.outputs.tag || '' }}`"
            echo "- Target image: `${{ steps.image.outputs.image || '' }}`"
            echo "- Image exists: `${{ steps.image.outputs.exists || '' }}`"
            echo "- Active Release run: `${{ steps.active_release.outputs.active || '' }}`"
          } >> "$GITHUB_STEP_SUMMARY"
