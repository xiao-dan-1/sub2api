name: Auto Build Missing Custom Tags

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom tag to build. Empty means scan every v*-xd.* tag.'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '17 * * * *'
  create:

concurrency:
  group: auto-build-missing-custom-tags
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  packages: write

jobs:
  build-missing-tags:
    name: Build missing custom images and repair latest
    if: >-
      github.event_name != 'create' ||
      (github.event.ref_type == 'tag' &&
      startsWith(github.event.ref, 'v') &&
      contains(github.event.ref, '-xd.'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4

      - name: Resolve candidate custom tags
        id: candidates
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
          CREATED_TAG: ${{ github.event_name == 'create' && github.event.ref || '' }}
        run: |
          set -euo pipefail

          git fetch origin --tags --force
          : > candidate-tags.txt

          if [ -n "${REQUESTED_TAG:-}" ]; then
            printf '%s\n' "$REQUESTED_TAG" > candidate-tags.txt
          elif [ -n "${CREATED_TAG:-}" ]; then
            printf '%s\n' "$CREATED_TAG" > candidate-tags.txt
          else
            git tag -l 'v*-xd.*' --sort=v:refname > candidate-tags.txt
          fi

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}-xd\.[0-9]+$ ]]; then
              echo "Unsupported custom tag format: $tag" >&2
              exit 1
            fi
            if ! git rev-parse -q --verify "$tag^{commit}" >/dev/null; then
              echo "Tag does not exist after fetch: $tag" >&2
              exit 1
            fi
          done < candidate-tags.txt

          count="$(grep -c . candidate-tags.txt || true)"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Resolved $count candidate custom tag(s)."
          cat candidate-tags.txt

      - name: Dispatch and wait for missing releases
        id: releases
        if: steps.candidates.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          owner_lower="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image_base="ghcr.io/${owner_lower}/sub2api"
          dispatched=0
          existing=0

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            version="${tag#v}"
            image="${image_base}:${version}"

            if crane digest "$image" >/dev/null 2>&1; then
              echo "Image already exists: $image"
              existing=$((existing + 1))
              continue
            fi

            run_name="Release ${tag}"
            previous_id="$(
              gh run list --repo "$GITHUB_REPOSITORY" --workflow release.yml --limit 100 \
                --json databaseId,displayTitle |
                jq -r --arg title "$run_name" \
                  '[.[] | select(.displayTitle == $title) | .databaseId] | max // 0'
            )"

            echo "Dispatching $run_name from ${DEFAULT_BRANCH}."
            gh workflow run release.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref "$DEFAULT_BRANCH" \
              -f "tag=${tag}" \
              -f "simple_release=true"

            run_id=''
            for _ in $(seq 1 60); do
              run_id="$(
                gh run list --repo "$GITHUB_REPOSITORY" --workflow release.yml --limit 100 \
                  --json databaseId,displayTitle |
                  jq -r --arg title "$run_name" --argjson previous "$previous_id" \
                    '[.[] | select(.displayTitle == $title and .databaseId > $previous)] |
                     max_by(.databaseId) | .databaseId // empty'
              )"
              if [ -n "$run_id" ]; then
                break
              fi
              sleep 5
            done

            if [ -z "$run_id" ]; then
              echo "Timed out waiting for the dispatched Release run for $tag." >&2
              exit 1
            fi

            echo "Waiting for Release run ${run_id}."
            gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status

            if ! crane digest "$image" >/dev/null 2>&1; then
              echo "Release succeeded but the exact image is still missing: $image" >&2
              exit 1
            fi
            dispatched=$((dispatched + 1))
          done < candidate-tags.txt

          echo "dispatched=$dispatched" >> "$GITHUB_OUTPUT"
          echo "existing=$existing" >> "$GITHUB_OUTPUT"

      - name: Point latest at the highest published custom tag
        id: latest
        shell: bash
        run: |
          set -euo pipefail

          owner_lower="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image_base="ghcr.io/${owner_lower}/sub2api"
          highest_tag=''
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            if crane digest "${image_base}:${tag#v}" >/dev/null 2>&1; then
              highest_tag="$tag"
              break
            fi
          done < <(git tag -l 'v*-xd.*' --sort=-v:refname)

          if [ -z "$highest_tag" ]; then
            echo "No published custom images exist; latest was not changed."
            printf 'repaired=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          exact_image="${image_base}:${highest_tag#v}"
          latest_image="${image_base}:latest"

          exact_digest="$(crane digest "$exact_image")"
          latest_digest="$(crane digest "$latest_image" 2>/dev/null || true)"
          if [ "$exact_digest" = "$latest_digest" ]; then
            echo "latest already matches ${highest_tag}: ${exact_digest}"
            {
              echo "repaired=false"
              echo "tag=$highest_tag"
              echo "digest=$exact_digest"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Retagging ${exact_image} as latest."
          crane tag "$exact_image" latest
          repaired_digest="$(crane digest "$latest_image")"
          if [ "$repaired_digest" != "$exact_digest" ]; then
            echo "latest digest mismatch after repair: expected $exact_digest, got $repaired_digest" >&2
            exit 1
          fi

          {
            echo "repaired=true"
            echo "tag=$highest_tag"
            echo "digest=$exact_digest"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Auto Build Missing Custom Tags"
            echo
            printf -- '- Candidate tags: %s\n' "${{ steps.candidates.outputs.count || '0' }}"
            printf -- '- Releases dispatched: %s\n' "${{ steps.releases.outputs.dispatched || '0' }}"
            printf -- '- Images already present: %s\n' "${{ steps.releases.outputs.existing || '0' }}"
            printf -- '- Highest published tag: %s\n' "${{ steps.latest.outputs.tag || '' }}"
            printf -- '- latest repaired: %s\n' "${{ steps.latest.outputs.repaired || 'false' }}"
            printf -- '- latest digest: %s\n' "${{ steps.latest.outputs.digest || '' }}"
          } >> "$GITHUB_STEP_SUMMARY"
