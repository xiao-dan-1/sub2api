name: Sync Upstream Custom Pack

on:
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: 'Upstream branch to mirror from Wei-Shaw/sub2api'
        required: false
        default: 'main'
        type: string
      mirror_branch:
        description: 'Private fork branch that mirrors upstream'
        required: false
        default: 'main'
        type: string
      custom_branch:
        description: 'Private fork branch with custom features'
        required: false
        default: 'custom'
        type: string
      tag_suffix:
        description: 'Custom release suffix, e.g. xd creates v0.1.156-xd.1'
        required: false
        default: 'xd'
        type: string
      force_release:
        description: 'Create a new custom tag even when custom branch did not change'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - custom
    paths:
      - '.github/workflows/sync-upstream-custom-pack.yml'
      - '.github/scripts/sync-conflict-signature.mjs'
  schedule:
    - cron: '7 * * * *'

concurrency:
  group: sync-upstream-custom-pack
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  sync-and-release:
    name: Sync upstream, merge custom, dispatch release
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPOSITORY: Wei-Shaw/sub2api
      UPSTREAM_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upstream_branch || 'main' }}
      MIRROR_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mirror_branch || 'main' }}
      CUSTOM_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.custom_branch || 'custom' }}
      TAG_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_suffix || 'xd' }}
      FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_release == 'true' }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch fork and upstream
        id: fetch
        shell: bash
        run: |
          set -euo pipefail

          if ! [[ "$UPSTREAM_BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Invalid upstream branch: $UPSTREAM_BRANCH" >&2
            exit 1
          fi
          if ! [[ "$MIRROR_BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Invalid mirror branch: $MIRROR_BRANCH" >&2
            exit 1
          fi
          if ! [[ "$CUSTOM_BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Invalid custom branch: $CUSTOM_BRANCH" >&2
            exit 1
          fi
          if ! [[ "$TAG_SUFFIX" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
            echo "Invalid tag suffix: $TAG_SUFFIX" >&2
            exit 1
          fi
          if [ "$MIRROR_BRANCH" = "$CUSTOM_BRANCH" ]; then
            echo "Mirror branch and custom branch must be different." >&2
            exit 1
          fi

          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git" 2>/dev/null || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"

          git fetch origin \
            "+refs/heads/${MIRROR_BRANCH}:refs/remotes/origin/${MIRROR_BRANCH}" \
            "+refs/heads/${CUSTOM_BRANCH}:refs/remotes/origin/${CUSTOM_BRANCH}" \
            --tags --prune
          git fetch upstream \
            "+refs/heads/${UPSTREAM_BRANCH}:refs/remotes/upstream/${UPSTREAM_BRANCH}" \
            --tags --prune

          upstream_sha="$(git rev-parse "refs/remotes/upstream/${UPSTREAM_BRANCH}")"
          mirror_sha="$(git rev-parse "refs/remotes/origin/${MIRROR_BRANCH}")"
          custom_sha="$(git rev-parse "refs/remotes/origin/${CUSTOM_BRANCH}")"

          {
            echo "upstream_sha=${upstream_sha}"
            echo "mirror_sha=${mirror_sha}"
            echo "custom_sha=${custom_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Mirror upstream to private main
        id: mirror
        shell: bash
        env:
          UPSTREAM_SHA: ${{ steps.fetch.outputs.upstream_sha }}
          MIRROR_SHA: ${{ steps.fetch.outputs.mirror_sha }}
        run: |
          set -euo pipefail

          if [ "$UPSTREAM_SHA" = "$MIRROR_SHA" ]; then
            echo "Private ${MIRROR_BRANCH} already mirrors upstream ${UPSTREAM_BRANCH}."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -B "$MIRROR_BRANCH" "$UPSTREAM_SHA"
          git push origin "HEAD:refs/heads/${MIRROR_BRANCH}" \
            --force-with-lease="refs/heads/${MIRROR_BRANCH}:${MIRROR_SHA}"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Merge mirrored main into custom branch
        id: custom
        shell: bash
        env:
          CUSTOM_SHA: ${{ steps.fetch.outputs.custom_sha }}
          UPSTREAM_SHA: ${{ steps.fetch.outputs.upstream_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git checkout -B "$CUSTOM_BRANCH" "refs/remotes/origin/${CUSTOM_BRANCH}"

          set +e
          git merge --no-edit "$UPSTREAM_SHA"
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            mapfile -t conflict_paths < <(
              git diff --name-only --diff-filter=U | sed '/^[[:space:]]*$/d' | LC_ALL=C sort -u
            )
            if [ "${#conflict_paths[@]}" -eq 0 ]; then
              echo 'Merge failed without unresolved paths; refusing to classify it as a sync conflict.' >&2
              git status --short >&2
              exit 1
            elif [ "${#conflict_paths[@]}" -eq 1 ] && [ "${conflict_paths[0]}" = "backend/cmd/server/VERSION" ]; then
              echo "Only VERSION conflicted; taking upstream base version before custom release tagging."
              git checkout --theirs backend/cmd/server/VERSION
              git add backend/cmd/server/VERSION
              git commit --no-edit
            else
              signature="$(printf '%s\n' "${conflict_paths[@]}" | node .github/scripts/sync-conflict-signature.mjs)"
              merge_base="$(git merge-base "$CUSTOM_SHA" "$UPSTREAM_SHA")"
              workflow_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              body_file="$(mktemp)"
              {
                printf '<!-- sync-conflict-signature: %s -->\n' "$signature"
                echo '# Upstream sync conflict'
                echo
                echo 'The scheduled mirror succeeded, but the custom branch needs a semantic merge.'
                echo
                printf -- '- Custom branch: `%s`\n' "$CUSTOM_BRANCH"
                printf -- '- Custom SHA: `%s`\n' "$CUSTOM_SHA"
                printf -- '- Latest upstream SHA: `%s`\n' "$UPSTREAM_SHA"
                printf -- '- Merge base: `%s`\n' "$merge_base"
                printf -- '- Conflict signature: `%s`\n' "$signature"
                printf -- '- Workflow run: %s\n' "$workflow_url"
                echo
                echo '## Conflicted paths'
                echo
                printf -- '- `%s`\n' "${conflict_paths[@]}"
                echo
                echo '## Reproduce'
                echo
                echo '```bash'
                printf 'git fetch origin %q %q\n' "$MIRROR_BRANCH" "$CUSTOM_BRANCH"
                printf 'git checkout %q\n' "$CUSTOM_BRANCH"
                printf 'git merge %q\n' "$UPSTREAM_SHA"
                echo '```'
                echo
                echo 'Unknown source conflicts are intentionally never auto-resolved.'
              } > "$body_file"

              gh label create sync-conflict \
                --repo "$GITHUB_REPOSITORY" \
                --color B60205 \
                --description 'Upstream cannot be merged into the custom branch automatically' \
                --force

              mapfile -t open_issues < <(
                gh issue list \
                  --repo "$GITHUB_REPOSITORY" \
                  --state open \
                  --label sync-conflict \
                  --limit 100 \
                  --json number \
                  --jq '.[].number'
              )
              issue_number="${open_issues[0]:-}"
              if [ "${#open_issues[@]}" -gt 1 ]; then
                for duplicate in "${open_issues[@]:1}"; do
                  gh issue close "$duplicate" \
                    --repo "$GITHUB_REPOSITORY" \
                    --comment "Closing duplicate sync-conflict incident; tracking continues in #${issue_number}."
                done
              fi

              if [ -z "$issue_number" ]; then
                issue_url="$(gh issue create \
                  --repo "$GITHUB_REPOSITORY" \
                  --title "[sync-conflict] ${UPSTREAM_BRANCH} -> ${CUSTOM_BRANCH}" \
                  --label sync-conflict \
                  --body-file "$body_file")"
                issue_number="${issue_url##*/}"
                echo "Created sync conflict issue #${issue_number}." >&2
                {
                  echo "issue_number=${issue_number}"
                  echo "conflict_signature=${signature}"
                  echo "conflict_repeated=false"
                  echo "merged=false"
                } >> "$GITHUB_OUTPUT"
                git merge --abort || true
                exit 1
              fi

              current_body="$(gh issue view "$issue_number" --repo "$GITHUB_REPOSITORY" --json body --jq .body)"
              current_signature="$(
                printf '%s\n' "$current_body" |
                  sed -nE 's/.*sync-conflict-signature: ([a-f0-9]{64}).*/\1/p' |
                  head -n 1
              )"
              incident_kind="$(
                node .github/scripts/sync-conflict-signature.mjs \
                  --classify "$current_signature" "$signature"
              )"
              gh issue edit "$issue_number" \
                --repo "$GITHUB_REPOSITORY" \
                --title "[sync-conflict] ${UPSTREAM_BRANCH} -> ${CUSTOM_BRANCH}" \
                --body-file "$body_file"

              {
                echo "issue_number=${issue_number}"
                echo "conflict_signature=${signature}"
                echo "merged=false"
              } >> "$GITHUB_OUTPUT"

              if [ "$incident_kind" = "repeated" ]; then
                echo "Repeated conflict incident #${issue_number}; updated upstream SHA without another failure."
                {
                  echo "conflict_repeated=true"
                  echo "changed=false"
                  echo "sha=${CUSTOM_SHA}"
                } >> "$GITHUB_OUTPUT"
                {
                  echo '### Repeated conflict suppressed'
                  echo
                  printf -- '- Tracking issue: #%s\n' "$issue_number"
                  printf -- '- Conflict signature: `%s`\n' "$signature"
                  printf -- '- Latest upstream SHA: `%s`\n' "$UPSTREAM_SHA"
                } >> "$GITHUB_STEP_SUMMARY"
                git merge --abort || true
                exit 0
              fi

              gh issue comment "$issue_number" \
                --repo "$GITHUB_REPOSITORY" \
                --body "Conflict path set changed; this run fails once for the new incident signature ${signature}."
              echo "Conflict path set changed; updated issue #${issue_number}." >&2
              echo "conflict_repeated=false" >> "$GITHUB_OUTPUT"
              git merge --abort || true
              exit 1
            fi
          fi

          new_custom_sha="$(git rev-parse HEAD)"
          if [ "$new_custom_sha" = "$CUSTOM_SHA" ]; then
            echo "Custom branch already contains mirrored upstream."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "sha=${new_custom_sha}" >> "$GITHUB_OUTPUT"
            echo "merged=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin "HEAD:refs/heads/${CUSTOM_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "sha=${new_custom_sha}" >> "$GITHUB_OUTPUT"
          echo "merged=true" >> "$GITHUB_OUTPUT"

      - name: Create next custom tag
        id: tag
        if: steps.custom.outputs.changed == 'true' || env.FORCE_RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git checkout "$CUSTOM_BRANCH"
          git fetch origin --tags --force

          raw_version="$(tr -d '\r\n' < backend/cmd/server/VERSION)"
          version="${raw_version%%-*}"
          if ! [[ "$version" =~ ^[0-9]+(\.[0-9]+){2}$ ]]; then
            echo "Expected VERSION like 0.1.156 or 0.1.156-${TAG_SUFFIX}.N, got: $raw_version" >&2
            exit 1
          fi

          tag_prefix="v${version}-${TAG_SUFFIX}"
          latest_tag="$(git tag -l "${tag_prefix}.*" --sort=-v:refname | head -n 1 || true)"
          if [ -z "$latest_tag" ]; then
            next_number=1
          else
            latest_number="${latest_tag##*.}"
            if ! [[ "$latest_number" =~ ^[0-9]+$ ]]; then
              echo "Cannot parse latest custom tag number from: $latest_tag" >&2
              exit 1
            fi
            next_number=$((latest_number + 1))
          fi

          tag="${tag_prefix}.${next_number}"
          git tag -a "$tag" -m "Custom release ${tag}"
          git push origin "$tag"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Close resolved sync conflict issue
        if: steps.custom.outputs.merged == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CUSTOM_SHA: ${{ steps.custom.outputs.sha }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          mapfile -t open_issues < <(
            gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --label sync-conflict \
              --limit 100 \
              --json number \
              --jq '.[].number'
          )
          for issue_number in "${open_issues[@]}"; do
            tag_note="${RELEASE_TAG:-not created}"
            gh issue close "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --comment "Resolved by custom SHA ${CUSTOM_SHA}; release tag: ${tag_note}."
          done

      - name: Dispatch custom tag builder
        if: steps.tag.outputs.tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          gh workflow run auto-build-custom-tags.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$CUSTOM_BRANCH" \
            -f "tag=${TAG}"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Sync Upstream Custom Pack"
            echo
            printf -- "- Upstream branch: \`%s/%s\`\n" "$UPSTREAM_REPOSITORY" "$UPSTREAM_BRANCH"
            printf -- "- Mirror branch: \`%s\`\n" "$MIRROR_BRANCH"
            printf -- "- Custom branch: \`%s\`\n" "$CUSTOM_BRANCH"
            printf -- "- Mirror changed: \`%s\`\n" "${{ steps.mirror.outputs.changed || '' }}"
            printf -- "- Custom changed: \`%s\`\n" "${{ steps.custom.outputs.changed || '' }}"
            printf -- "- Repeated conflict suppressed: \`%s\`\n" "${{ steps.custom.outputs.conflict_repeated || 'false' }}"
            printf -- "- Conflict issue: \`%s\`\n" "${{ steps.custom.outputs.issue_number || '' }}"
            printf -- "- Created tag: \`%s\`\n" "${{ steps.tag.outputs.tag || '' }}"
            printf -- "- Builder dispatched: \`%s\`\n" "${{ steps.tag.outputs.tag != '' }}"
          } >> "$GITHUB_STEP_SUMMARY"
